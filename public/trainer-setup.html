<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | FitNova Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trainer-portal.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Professional Profile Setup</h1>
                    <p class="muted-text">Customize how clients discover you on the marketplace.</p>
                </div>
            </header>
            
            <div id="setupMsg" style="text-align:center; margin-bottom:1rem;"></div>

            <div class="panel" style="max-width: 600px;">
                <form id="trainerProfileForm">
                    <div class="form-group">
                        <label>Specialties (comma separated)</label>
                        <input type="text" id="specialties" placeholder="e.g. Weightlifting, Yoga, HIIT" required>
                    </div>
                    <div class="form-group">
                        <label>Certifications (comma separated)</label>
                        <input type="text" id="certifications" placeholder="e.g. NASM, ACE, CPR" required>
                    </div>
                    <button type="submit" class="btn-green" style="width:100%; justify-content:center; padding: 14px; margin-top: 16px;">Save Professional Profile</button>
                </form>
            </div>
            
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/trainer-setup.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Profile</h1>
                    <p class="muted-text">Manage your fitness identity.</p>
                </div>
            </header>

            <div id="profileMsg" style="text-align:center; margin-bottom:1rem;"></div>

            <!-- Profile Header -->
            <div class="panel profile-header" id="profileHeader" style="margin-bottom: 32px; padding: 40px; display: flex; align-items: center; gap: 40px; position: relative; overflow: hidden;">
                <div class="avatar-container">
                    <div class="avatar" id="pAvatar" style="width: 120px; height: 120px; background: var(--bg2); border: 4px solid var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; color: var(--green-d); box-shadow: var(--shadow-md);">?</div>
                </div>
                <div class="profile-info" style="flex: 1;">
                    <div style="display:flex; align-items:center; gap: 16px; margin-bottom: 8px;">
                        <h2 id="pName" style="margin:0; font-size: 2rem;">Loading...</h2>
                        <span class="badge" id="pRole" style="height: fit-content;">Member</span>
                    </div>
                    <p id="pBio" style="color: var(--muted); margin-bottom: 20px; font-size: 1.1rem; max-width: 600px;">No bio provided yet.</p>
                    
                    <div class="stats-row" style="display: flex; gap: 40px;">
                        <div><strong id="pFollowers" style="font-size: 1.25rem; display: block;">0</strong> <span style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;">Followers</span></div>
                        <div><strong id="pFollowing" style="font-size: 1.25rem; display: block;">0</strong> <span style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;">Following</span></div>
                    </div>
                </div>
                
                <div class="actions" style="position: absolute; top: 40px; right: 40px;">
                    <button class="btn-ghost" id="editProfileBtn" style="display:none;"><i class="fas fa-edit"></i> Edit Profile</button>
                    <div style="display: flex; gap: 12px;" id="otherUserActions">
                        <button class="btn-ghost" id="messageBtn" style="display:none;"><i class="fas fa-comment"></i> Message</button>
                        <button class="btn-green" id="connectBtn" style="display:none;"><i class="fas fa-plus"></i> Follow</button>
                    </div>
                </div>
            </div>

            <div class="panels-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <!-- Fitness Interests -->
                <div class="panel">
                    <h3 style="margin-bottom: 20px;">Fitness Interests</h3>
                    <div class="tags" id="pInterests" style="display:flex; flex-wrap:wrap; gap:8px;">
                        <span class="badge">Not specified</span>
                    </div>
                </div>

                <!-- Achievements -->
                <div class="panel">
                    <h3 style="margin-bottom: 20px;">Recent Achievements</h3>
                    <div id="pAchievements" style="color: var(--muted); font-size: 0.95rem;">
                        No achievements listed.
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal">
        <div class="panel modal-content" style="max-width: 500px; margin: 50px auto;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
                <h2>Edit Profile</h2>
                <button class="btn-ghost" onclick="this.closest('.modal').classList.remove('open')" style="padding: 4px 10px;">&times;</button>
            </div>
            <form id="editProfileForm">
                <div class="form-group">
                    <label>Profile Picture</label>
                    <div style="display:flex; align-items:center; gap:16px; margin-top:8px;">
                        <input type="file" id="editAvatarFile" accept="image/*" style="font-size: 0.85rem;">
                    </div>
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="editBio" placeholder="Tell the community about yourself..." rows="4" style="resize:none;"></textarea>
                </div>
                <div class="form-group">
                    <label>Interests (comma separated)</label>
                    <input type="text" id="editInterests" placeholder="e.g. Yoga, Powerlifting, Running">
                </div>
                <div style="display:flex; gap:12px; justify-content:flex-end; margin-top: 24px;">
                    <button type="button" class="btn-ghost" onclick="this.closest('.modal').classList.remove('open')">Cancel</button>
                    <button type="submit" class="btn-green">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/user-profile.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

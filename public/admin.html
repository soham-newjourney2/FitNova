<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Center | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Admin Control Center</h1>
                    <p class="muted-text">Manage users and monitor system health.</p>
                </div>
            </header>
            
            <div id="errorMsg" style="text-align:center; margin-bottom:16px;"></div>
            
            <div id="adminContent" style="display:none;">
                <div class="grid-cards" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 32px;">
                    <div class="panel" style="text-align: center;">
                        <h3 style="font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">Users</h3>
                        <div class="value" id="statUsers" style="font-size: 1.5rem; font-weight: 800; color: var(--green-d);">0</div>
                    </div>
                    <div class="panel" style="text-align: center;">
                        <h3 style="font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">Trainers</h3>
                        <div class="value" id="statTrainers" style="font-size: 1.5rem; font-weight: 800; color: var(--green-d);">0</div>
                    </div>
                    <div class="panel" style="text-align: center;">
                        <h3 style="font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">Events</h3>
                        <div class="value" id="statEvents" style="font-size: 1.5rem; font-weight: 800; color: var(--green-d);">0</div>
                    </div>
                    <div class="panel" style="text-align: center;">
                        <h3 style="font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">Groups</h3>
                        <div class="value" id="statGroups" style="font-size: 1.5rem; font-weight: 800; color: var(--green-d);">0</div>
                    </div>
                    <div class="panel" style="text-align: center;">
                        <h3 style="font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">Workouts</h3>
                        <div class="value" id="statWorkouts" style="font-size: 1.5rem; font-weight: 800; color: var(--green-d);">0</div>
                    </div>
                </div>

                <div class="panel" style="padding: 0; overflow: hidden;">
                    <h3 style="padding: 24px; border-bottom: 1px solid var(--border);">User Management</h3>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="background: var(--bg2);">
                                    <th style="padding: 16px 24px;">Name</th>
                                    <th style="padding: 16px 24px;">Email</th>
                                    <th style="padding: 16px 24px;">Role</th>
                                    <th style="padding: 16px 24px;">Joined</th>
                                    <th style="padding: 16px 24px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable">
                                <tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--muted);">Loading users...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/admin.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracking | FitNova</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tracking.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="layout">
        <aside class="sidebar">
            <h2>FitNova</h2>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="tracking.html" class="active">Fitness Tracking</a>
                <a href="community.html">Community Network</a>
                <a href="trainers.html">Trainer Marketplace</a>
                <a href="events.html">Events</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <h1 style="margin-bottom: 2rem;">Fitness Tracking</h1>
            </div>

            <div class="tracking-grid">
                <!-- Log Form -->
                <div class="panel">
                    <h3>Log New Workout</h3>
                    <form id="logWorkoutForm">
                        <div class="form-group">
                            <label for="exerciseType">Exercise Type</label>
                            <select id="exerciseType" class="form-input" required>
                                <option value="Cardio">Cardio / Running</option>
                                <option value="Strength Training">Strength Training</option>
                                <option value="HIIT">HIIT</option>
                                <option value="Yoga">Yoga / Flexibility</option>
                                <option value="Sports">Sports</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration (minutes)</label>
                            <input type="number" id="duration" class="form-input" required placeholder="e.g. 45">
                        </div>
                        <div class="form-group">
                            <label for="caloriesBurned">Calories Burned</label>
                            <input type="number" id="caloriesBurned" class="form-input" required placeholder="e.g. 300">
                        </div>
                        <div class="form-group">
                            <label for="notes">Notes (Optional)</label>
                            <input type="text" id="notes" class="form-input" placeholder="How did it feel?">
                        </div>
                        <button type="submit" class="btn-primary">Save Workout</button>
                        <div id="logMessage" style="margin-top:1rem; text-align:center;"></div>
                    </form>
                </div>
                
                <!-- History -->
                <div class="panel">
                    <h3>Recent History</h3>
                    <div id="historyList">
                        <p style="color: var(--text-secondary);">Loading history...</p>
                    </div>
                </div>

                <!-- V3: Gamification -->
                <div class="panel" style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; background: transparent; border: none; padding: 0;">
                    
                    <div class="panel" style="margin: 0;">
                        <h3>📍 Gym Check-In</h3>
                        <p style="color: var(--text-secondary); margin-bottom: 1rem;">Check in to local gyms to earn the "Mayor" title.</p>
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                            <input type="text" id="gymLocationInput" class="form-input" placeholder="e.g. Gold's Gym Downtown" style="flex:1;">
                            <button id="checkInBtn" class="btn-primary" style="margin:0; width:auto;">Check In</button>
                        </div>
                        <div id="checkInMsg" style="text-align: center;"></div>
                    </div>

                    <div class="panel" style="margin: 0;">
                        <h3>🏆 Active Challenges</h3>
                        <div id="challengesList">
                            <p style="color: var(--text-secondary);">Loading challenges...</p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/tracking.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracking | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tracking.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Workout Tracking</h1>
                    <p class="muted-text">Log your activities and see your progress.</p>
                </div>
            </header>

            <div class="tracking-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <!-- Log Form -->
                <div class="panel">
                    <h3 style="margin-bottom: 24px;">Log New Workout</h3>
                    <form id="logWorkoutForm">
                        <div class="form-group">
                            <label>Exercise Type</label>
                            <select id="exerciseType" required>
                                <option value="Cardio">Cardio / Running</option>
                                <option value="Strength Training">Strength Training</option>
                                <option value="HIIT">HIIT</option>
                                <option value="Yoga">Yoga / Flexibility</option>
                                <option value="Sports">Sports</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div style="display:flex; gap:16px;">
                            <div class="form-group" style="flex:1;">
                                <label>Duration (min)</label>
                                <input type="number" id="duration" required placeholder="45">
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>Calories</label>
                                <input type="number" id="caloriesBurned" required placeholder="300">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Notes (Optional)</label>
                            <input type="text" id="notes" placeholder="How was it?">
                        </div>
                        <button type="submit" class="btn-green" style="width:100%; justify-content:center; padding:14px;">Save Workout</button>
                        <div id="logMessage" style="margin-top:1rem; text-align:center;"></div>
                    </form>
                </div>
                
                <!-- History -->
                <div class="panel">
                    <h3 style="margin-bottom: 24px;">Recent History</h3>
                    <div id="historyList">
                        <p class="loading-text">Loading history...</p>
                    </div>
                </div>

                <!-- Gamification Section -->
                <div class="panel" style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; background:transparent; border:none; padding:0; box-shadow:none;">
                    
                    <div class="panel" style="margin:0;">
                        <h3 style="margin-bottom:12px;">📍 Gym Check-In</h3>
                        <p class="muted-text" style="margin-bottom:20px;">Check in to local gyms to earn titles.</p>
                        <div style="display: flex; gap: 12px;">
                            <input type="text" id="gymLocationInput" placeholder="Gym name..." style="flex:1;">
                            <button id="checkInBtn" class="btn-green">Check In</button>
                        </div>
                        <div id="checkInMsg" style="margin-top:12px;"></div>
                    </div>

                    <div class="panel" style="margin:0;">
                        <h3 style="margin-bottom:12px;">🏆 Active Challenges</h3>
                        <div id="challengesList" style="margin-top: 12px;">
                            <p class="loading-text">Loading challenges...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/tracking.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

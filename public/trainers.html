<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainers | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trainers.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Trainer Marketplace</h1>
                    <p class="muted-text">Find and book sessions with expert trainers.</p>
                </div>
            </header>
            
            <div id="bookingMsg" style="text-align: center; margin-bottom: 1rem;"></div>

            <!-- Search and Filter Bar -->
            <div class="panel" style="margin-bottom: 32px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="flex:2; min-width: 200px; margin:0;">
                    <label>Search Trainers</label>
                    <input type="text" id="trainerSearch" placeholder="Name or specialty...">
                </div>
                <div class="form-group" style="flex:1; min-width: 150px; margin:0;">
                    <label>Specialty</label>
                    <input type="text" id="trainerSpecialty" placeholder="Filter Specialty...">
                </div>
                <button id="searchTrainersBtn" class="btn-green" style="height: 46px;">Search</button>
            </div>

            <div class="trainers-grid" id="trainersList">
                <p class="loading-text">Loading trainers...</p>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/trainers.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

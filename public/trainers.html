<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Marketplace | FitNova</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trainers.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="layout">
        <aside class="sidebar">
            <h2>FitNova</h2>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="tracking.html">Fitness Tracking</a>
                <a href="community.html">Community Network</a>
                <a href="trainers.html" class="active">Trainer Marketplace</a>
                <a href="events.html">Events</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <h1>Trainer Marketplace</h1>
                <p style="color: var(--text-secondary);">Find and book sessions with expert trainers.</p>
            </div>
            
            <div id="bookingMsg" style="text-align: center; margin-bottom: 1rem;"></div>

            <!-- Search and Filter Bar -->
            <div class="panel" style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                <input type="text" id="trainerSearch" class="form-input" style="flex:2; min-width: 200px;" placeholder="Search by name or specialty...">
                <input type="text" id="trainerSpecialty" class="form-input" style="flex:1; min-width: 150px;" placeholder="Filter Specialty...">
                <button id="searchTrainersBtn" class="btn-primary" style="margin:0; width:auto;">Search</button>
            </div>

            <div class="trainers-grid" id="trainersList">
                <p style="color: var(--text-secondary);">Loading trainers...</p>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/trainers.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

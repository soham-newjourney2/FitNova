<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/community.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Community</h1>
                    <p class="muted-text">Share your journey. Get inspired.</p>
                </div>
            </header>
            
            <div class="community-main-layout">
                <section class="feed-container">
                    <div class="panel post-creator">
                        <div class="creator-header">
                            <img src="" id="currentUserAvatar" alt="Me" class="user-avatar">
                            <button id="startPostBtn" class="fake-input">What's your workout win today?</button>
                        </div>
                        <div class="creator-footer">
                            <button class="action-item" onclick="document.getElementById('startPostBtn').click()"><i class="fas fa-camera" style="color:#ff3040"></i> Photo</button>
                            <button class="action-item" onclick="document.getElementById('startPostBtn').click()"><i class="fas fa-chart-line" style="color:#00d2ff"></i> Stats</button>
                            <button class="action-item" onclick="document.getElementById('startPostBtn').click()"><i class="fas fa-lightbulb" style="color:#ffd700"></i> Tip</button>
                        </div>
                    </div>

                    <div id="postsFeed" class="posts-feed">
                        <p class="loading-text">Loading feed...</p>
                    </div>
                </section>

                <aside class="community-right-panel">
                    <div class="panel panel-section">
                        <h3>Discover</h3>
                        <div class="category-links">
                            <a href="#" class="cat-link active" data-filter="all">🌐 Global Feed</a>
                            <a href="#" class="cat-link" data-filter="workouts">💪 Workouts</a>
                            <a href="#" class="cat-link" data-filter="nutrition">🥗 Nutrition</a>
                            <a href="#" class="cat-link" data-filter="achievements">🏆 Milestones</a>
                        </div>
                    </div>

                    <div class="panel panel-section">
                        <div class="section-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                            <h3 style="margin:0;">Your Squads</h3>
                            <button title="Create Squad" class="btn-ghost" style="padding: 4px 8px;"><i class="fas fa-plus"></i></button>
                        </div>
                        <div id="squadsList" class="squad-list">
                            <p class="empty-msg">Join a squad to connect!</p>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Modals (Styling inherited from community.css and panels) -->
    <div id="postModal" class="modal">
        <div class="panel modal-content" style="max-width: 500px; margin: 50px auto;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
                <h2>Create Post</h2>
                <button class="close-modal btn-ghost" style="padding: 4px 10px;">&times;</button>
            </div>
            <form id="createPostForm">
                <div class="form-group">
                    <textarea id="postContent" placeholder="Describe your achievement..." style="min-height:120px; resize:none;" required></textarea>
                </div>
                
                <label class="image-upload-wrapper" for="postImage">
                    <div class="upload-label" id="uploadLabel">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>Click to add a photo</span>
                    </div>
                    <img id="imagePreview" class="image-preview" src="" alt="Preview">
                </label>
                <input type="file" id="postImage" accept="image/*">

                <div class="form-footer" style="display:flex; gap: 12px; margin-top: 20px;">
                    <select id="postCategory" class="form-group" style="margin:0; flex:1;">
                        <option value="general">Standard Post</option>
                        <option value="workouts">Workout Win</option>
                        <option value="nutrition">Nutrition Tip</option>
                        <option value="achievements">Milestone</option>
                    </select>
                    <button type="submit" class="btn-green" id="submitPostBtn">Share</button>
                </div>
            </form>
        </div>
    </div>

    <div id="commentsModal" class="modal">
        <div class="panel modal-content" style="height: 80vh; max-width: 500px; display: flex; flex-direction: column;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:16px;">
                <h2 style="font-size:1.2rem; margin:0;">Post Comments</h2>
                <button class="close-comments-modal btn-ghost" style="padding: 4px 10px;">&times;</button>
            </div>
            <div id="commentsList" style="flex:1; overflow-y:auto; padding: 20px 0; display: flex; flex-direction: column;">
                <p class="loading-text" style="text-align:center;">Loading comments...</p>
            </div>
            <form id="addCommentForm" style="border-top: 1px solid var(--border); padding-top: 16px;">
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="commentInput" placeholder="Write a comment..." required autocomplete="off" style="flex:1; border-radius: var(--r-pill);">
                    <button type="submit" class="btn-green" style="padding: 0 20px;">Send</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/community.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding | FitNova</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="auth-container">
        <h2>Complete Your Profile</h2>
        <p>Let's map out your fitness baseline</p>
        
        <form id="onboardingForm">
            <!-- New Form Fields -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" required placeholder="e.g. 25">
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                    <option value="Prefer not to say">Prefer not to say</option>
                </select>
            </div>
            <div class="form-group">
                <label for="medicalConditions">Medical Conditions (Optional)</label>
                <input type="text" id="medicalConditions" placeholder="Any injuries, asthma, diabetes, etc.">
            </div>
            
            <!-- Existing Form Fields -->
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" required placeholder="e.g. 175">
            </div>
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" required placeholder="e.g. 70">
            </div>
            <div class="form-group">
                <label for="caloriesIntake">Target Daily Calories Intake</label>
                <input type="number" id="caloriesIntake" required placeholder="e.g. 2000">
            </div>
            <div class="form-group">
                <label for="caloriesLoss">Target Daily Calories Burn</label>
                <input type="number" id="caloriesLoss" required placeholder="e.g. 500">
            </div>
            <div class="form-group">
                <label for="experience">Workout Experience</label>
                <select id="experience" required>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Complete Setup</button>
            <div id="authMessage"></div>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

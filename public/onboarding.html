<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Setup | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .auth-container { max-width: 500px; padding: 48px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="panel auth-container">
        <h2 style="font-size: 2rem; margin-bottom: 8px;">Complete Profile</h2>
        <p class="muted-text" style="margin-bottom: 32px;">Let's map out your fitness baseline.</p>
        
        <form id="onboardingForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" required placeholder="25">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Medical Conditions</label>
                    <input type="text" id="medicalConditions" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" id="height" required placeholder="175">
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" required placeholder="70">
                </div>
                <div class="form-group">
                    <label>Daily Calorie Intake</label>
                    <input type="number" id="caloriesIntake" required placeholder="2000">
                </div>
                <div class="form-group">
                    <label>Daily Calorie Burn</label>
                    <input type="number" id="caloriesLoss" required placeholder="500">
                </div>
                <div class="form-group full-width">
                    <label>Workout Experience</label>
                    <select id="experience" required>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn-green" style="width:100%; justify-content:center; padding:14px; margin-top:24px;">Complete Setup</button>
            <div id="authMessage" style="margin-top:16px; text-align:center;"></div>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

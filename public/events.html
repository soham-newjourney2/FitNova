<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | FitNova</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/events.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
    
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Explore Events</h1>
                    <p class="muted-text">Find workshops, bootcamps and local meetups.</p>
                </div>
            </header>

            <div class="events-hero panel" style="margin-bottom: 32px; padding: 40px; text-align: center;">
                <h2 style="font-size: 2.5rem; margin-bottom: 12px; letter-spacing: -0.02em;">Unleash Your Potential</h2>
                <p style="color: var(--muted); max-width: 600px; margin: 0 auto 32px auto;">Find local workouts, join community bootcamps, or host your own epic fitness journey.</p>
                
                <div class="panel hero-search-container" style="max-width: 800px; margin: 0 auto; display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: var(--r-pill);">
                    <div style="flex: 1; display: flex; align-items: center; gap: 10px; padding-left: 12px;">
                        <i class="fas fa-search" style="color: var(--muted);"></i>
                        <input type="text" id="eventSearch" placeholder="Search events..." style="border:none; background:transparent; padding:10px 0;">
                    </div>
                    <div style="width: 1px; height: 24px; background: var(--border);"></div>
                    <div style="flex: 0.7; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-map-marker-alt" style="color: var(--muted);"></i>
                        <input type="text" id="eventLocation" placeholder="Location..." style="border:none; background:transparent; padding:10px 0;">
                    </div>
                    <button id="searchEventsBtn" class="btn-green" style="padding: 10px 24px;">Explore</button>
                </div>
            </div>
            
            <div id="eventMsg" style="text-align: center; margin-bottom: 24px; color: var(--green-d); font-weight: 600;"></div>

            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-bottom:32px;">
                <div class="filter-tabs" id="filterTabs" style="display:flex; gap:12px;">
                    <button class="btn-ghost filter-tab active" data-filter="all">All</button>
                    <button class="btn-ghost filter-tab" data-filter="upcoming">Upcoming</button>
                    <button class="btn-ghost filter-tab" data-filter="foryou">Recommended</button>
                </div>
                
                <button id="locateMeBtn" class="btn-ghost"><i class="fas fa-location-arrow"></i> Near Me</button>
            </div>

            <div class="events-main-layout">
                <div class="events-grid-container">
                    <div class="grid-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
                        <h3>Trending Activities</h3>
                        <button id="createEventBtn" class="btn-green"><i class="fas fa-plus"></i> Host Event</button>
                    </div>

                    <div id="eventsList" class="events-premium-grid">
                        <p class="loading-text">Loading spectacular events...</p>
                    </div>
                </div>

                <aside class="events-side-panel">
                    <div class="panel side-card map-card" style="margin-bottom: 20px;">
                        <h3>Live Coverage</h3>
                        <div id="eventMap" style="height: 200px; border-radius: 12px; margin-top: 16px; border: 1px solid var(--border);"></div>
                    </div>

                    <div class="panel side-card activity-card">
                        <h3>Activity Stream</h3>
                        <div id="notificationsList" class="mini-notifs" style="margin-top: 16px;">
                            <p class="empty-msg">No recent activities.</p>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Host Event Modal -->
    <div id="createEventFormContainer" class="modal">
        <div class="panel modal-content" style="max-width: 500px; margin: 50px auto;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
                <h2>Host Event</h2>
                <button class="close-create-event btn-ghost" style="padding: 4px 10px;">&times;</button>
            </div>
            <form id="createEventForm">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" id="evTitle" placeholder="e.g. Morning Yoga Flow" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="evDesc" placeholder="Workout details..." rows="3" style="resize:none;" required></textarea>
                </div>
                <div style="display:flex; gap:16px;">
                    <div class="form-group" style="flex:1;">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="evDate" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Max Attendees</label>
                        <input type="number" id="evMax" placeholder="20">
                    </div>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="evLocation" placeholder="Park, Gym, or Online link" required>
                </div>
                <button type="submit" class="btn-green" style="width:100%; justify-content:center; padding:14px;">Publish Event</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/events.js"></script>
</body>
</html>

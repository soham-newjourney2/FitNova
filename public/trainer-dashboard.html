<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Dashboard | FitNova Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trainer-portal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Trainer Overview</h1>
                    <p class="muted-text">Welcome back to your professional portal.</p>
                </div>
            </header>
            
            <div class="panel profile-panel" id="tProfilePanel" style="margin-bottom: 32px; display: flex; align-items: center; gap: 24px; padding: 24px;">
                <div class="avatar" id="tInitial" style="width: 64px; height: 64px; background: var(--green-l); color: var(--green-d); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800;">T</div>
                <div class="profile-info">
                    <h3 id="tName" style="margin: 0; font-size: 1.25rem;">Trainer Name</h3>
                    <p id="tRole" class="muted-text">Professional Trainer</p>
                </div>
            </div>

            <div class="grid-cards" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px;">
                <div class="panel" style="text-align: center;">
                    <h3 style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 12px;">Rating</h3>
                    <div class="value" id="tRating" style="font-size: 2rem; font-weight: 800; color: var(--green-d);">--</div>
                </div>
                <div class="panel" style="text-align: center;">
                    <h3 style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 12px;">Clients</h3>
                    <div class="value" id="tTotalBookings" style="font-size: 2rem; font-weight: 800; color: var(--green-d);">0</div>
                </div>
                <div class="panel" style="text-align: center;">
                    <h3 style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 12px;">Reviews</h3>
                    <div class="value" id="tTotalReviews" style="font-size: 2rem; font-weight: 800; color: var(--green-d);">0</div>
                </div>
            </div>

            <div class="panel" style="margin-bottom: 32px;">
                <h3 style="margin-bottom: 8px;">Manage Availability</h3>
                <p class="muted-text" style="margin-bottom: 24px;">Add open time slots for clients to book.</p>
                
                <form id="addSlotForm" style="display:flex; gap:16px; align-items:flex-end; margin-bottom: 32px; flex-wrap: wrap;">
                    <div class="form-group" style="margin: 0; flex: 1; min-width: 200px;">
                        <label>Select Date & Time</label>
                        <input type="datetime-local" id="newSlotTime" required>
                    </div>
                    <button type="submit" class="btn-green" style="height: 46px; padding: 0 24px;">Add Slot</button>
                </form>
                
                <div id="slotMsg" style="margin-bottom: 16px;"></div>
                
                <h4 style="font-size: 0.95rem; margin-bottom: 16px;">Published Slots</h4>
                <div id="slotsList" style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <p class="loading-text">Loading slots...</p>
                </div>
            </div>

            <div class="panel">
                <h3 style="margin-bottom: 16px;">Quick Actions</h3>
                <div style="display:flex; gap:16px;">
                    <a href="trainer-bookings.html" class="btn-green" style="text-decoration:none;">View Appointments</a>
                    <a href="trainer-setup.html" class="btn-ghost" style="text-decoration:none;">Edit Professional Profile</a>
                </div>
            </div>
            
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/trainer-dashboard.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>

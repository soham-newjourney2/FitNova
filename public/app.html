<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitNova Connect</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="app-layout" style="display: flex; height: 100vh; width: 100vw; position: relative; z-index: 1;">
        <!-- 1. Server Bar -->
        <div class="server-bar" id="serverBar" style="width: 72px; flex-shrink: 0;">
            <a href="dashboard.html" title="Dashboard" class="server-icon" style="margin-bottom: 8px;">
                <img src="https://ui-avatars.com/api/?name=F&background=4facfe&color=fff" style="width:100%; height:100%; border-radius:inherit;" alt="Home">
            </a>
            <div class="server-icon active" id="btn-home" onclick="switchDomain('home')" style="font-size: 1.25rem;">
                <i class="fas fa-comment"></i>
            </div>
            <div style="width: 32px; height: 2px; background: var(--border); margin: 4px 0;"></div>
            
            <!-- Squads -->
            <div class="server-icon" title="Dawn Patrol Runners" onclick="switchDomain('squad_1')">DP</div>
            <div class="server-icon" title="Heavy Lifters" onclick="switchDomain('squad_2')">HL</div>

            <div class="server-icon" title="Create Squad" style="color: var(--green-d); background: var(--green-l);">
                <i class="fas fa-plus"></i>
            </div>
        </div>

        <!-- 2. Channels Sidebar -->
        <div class="channel-sidebar" id="channelSidebar" style="width: 240px; flex-shrink: 0; display: flex; flex-direction: column;">
            <div class="sidebar-header" id="sidebarTitle">Direct Messages</div>
            
            <div class="channel-list" id="sidebarList" style="flex: 1; overflow-y: auto; padding: 12px 0;">
                <div class="channel-item active">
                    <i class="fas fa-user-friends"></i> Friends
                </div>
            </div>

            <div class="user-panel">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg2); overflow: hidden;">
                    <img src="https://ui-avatars.com/api/?name=Me" id="currentUserAvatar" style="width: 100%; height: 100%;">
                </div>
                <div style="flex: 1; overflow: hidden;">
                    <div id="currentUserName" style="font-weight: 700; font-size: 0.9rem; white-space: nowrap; text-overflow: ellipsis;">My Name</div>
                    <div style="font-size: 0.75rem; color: var(--muted);">#1234</div>
                </div>
                <i class="fas fa-cog" style="color: var(--muted); cursor: pointer;"></i>
            </div>
        </div>

        <!-- 3. Main Content -->
        <div class="main-content" style="flex: 1; display: flex; flex-direction: column; background: var(--white);">
            <header class="content-header">
                <div id="contentTitle" style="font-weight: 800; font-size: 1.1rem;">
                    <span style="color: var(--muted);">@</span> Alex Runner
                </div>
                <div id="contentDesc" style="margin-left: 12px; font-size: 0.85rem; color: var(--muted); border-left: 1px solid var(--border); padding-left: 12px;">Available for a run!</div>
                
                <div style="margin-left: auto; display: flex; gap: 20px; color: var(--muted);">
                    <i class="fas fa-phone-alt" style="cursor:pointer;" onclick="startVoiceCall()" title="Voice Call"></i>
                    <i class="fas fa-video" style="cursor:pointer;" title="Video Call"></i>
                    <i class="fas fa-users" style="cursor:pointer; color: var(--text);" onclick="toggleMembers()" title="Members"></i>
                </div>
            </header>

            <div style="flex: 1; position: relative;">
                <!-- Snapchat Stories Layer -->
                <div class="stories-bar" id="storiesBar" style="display: flex; gap: 16px; padding: 20px; border-bottom: 1px solid var(--border);">
                    <div class="story-item" style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;">
                        <div style="width: 56px; height: 56px; border-radius: 50%; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-plus"></i>
                        </div>
                        <span style="font-size: 0.75rem;">Add Story</span>
                    </div>
                </div>

                <!-- Messages Placeholder -->
                <div id="messagesContainer" style="padding: 24px; color: var(--muted); text-align: center;">
                    Select a conversation to start chatting.
                </div>
            </div>

            <div class="chat-input-wrapper">
                <input type="text" class="chat-input" placeholder="Message @Alex Runner" style="width: 100%; border: none; background: var(--bg2); padding: 12px 16px; border-radius: 8px;">
            </div>
        </div>

        <!-- 4. Members Sidebar -->
        <div class="members-sidebar" id="membersSidebar" style="width: 240px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px;">
            <div style="font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 16px;">Online — 1</div>
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg3);"></div>
                <div style="font-weight: 600; font-size: 0.9rem;">Alex Runner</div>
            </div>
        </div>
    </div>

    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
        // Rest of the scripts maintained...
        function switchDomain(domainId) {
            document.querySelectorAll('.server-icon').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            // ... logic from old app.html
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | FitNova Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trainer-portal.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="bg-mesh">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="layout">
        <aside class="sidebar-new">
            <!-- Injected via sidebar.js -->
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>My Appointments</h1>
                    <p class="muted-text">Manage incoming booking requests from the marketplace.</p>
                </div>
            </header>
            
            <div class="panel" style="padding: 0; overflow: hidden;">
                <h3 style="padding: 24px; border-bottom: 1px solid var(--border);">Upcoming Sessions</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: var(--bg2);">
                                <th style="text-align:left; padding: 16px 24px; font-size: 0.85rem; color: var(--muted); text-transform: uppercase;">Client Name</th>
                                <th style="text-align:left; padding: 16px 24px; font-size: 0.85rem; color: var(--muted); text-transform: uppercase;">Time Slot</th>
                                <th style="text-align:left; padding: 16px 24px; font-size: 0.85rem; color: var(--muted); text-transform: uppercase;">Status</th>
                                <th style="text-align:left; padding: 16px 24px; font-size: 0.85rem; color: var(--muted); text-transform: uppercase;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTable">
                            <tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--muted);">Loading bookings...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/trainer-bookings.js"></script>
    <script>
        if(typeof logout === 'undefined') {
            window.logout = () => { localStorage.clear(); window.location.href='login.html'; }
        }
    </script>
</body>
</html>
